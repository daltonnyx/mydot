# vim: ft=hypr
#

general {
  gaps_in=2
  gaps_out=4
  border_size=2
  col.active_border= $lavender $sapphire 45deg
  #no_border_on_floating = true
  layout = scrolling
  #allow_tearing=true
}


scrolling {
  column_width = 0.67
  focus_fit_method = 1
}


