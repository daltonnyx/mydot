# vim: ft=hypr
#

general {
  gaps_in=2
  gaps_out=4
  border_size=2
  col.active_border= $lavender $sapphire 45deg
  #no_border_on_floating = true
  layout = master
  #allow_tearing=true
}

master {
  mfact = 0.6
  allow_small_split = true
  new_on_top = true
  new_status = slave
}


